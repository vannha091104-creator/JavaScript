<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return First and Last Name form a Form</title>

    <style>
        body {
            margin: 30px;
            font-family: Arial, sans-serif;
        }

        label {
            display: inline-block;
            width: 90px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            padding: 4px 8px;
        }

        input[type="submit"] {
            margin-top: 10px;
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Return First and Last Name</h1>

    <form id="form1">
        <div>
            <label for="fname">First name:</label>
            <input
                type="text"
                id="fname"
                name="fname"
                value="Nha">
        </div>

        <div>
            <label for="lname">Last name:</label>
            <input
                type="text"
                id="lname"
                name="lname"
                value="Nguyen">
        </div>

        <input type="submit" value="Submit">
    </form>

    <script src="return-name.js"></script>

</body>

</html>
